services:
  - type: web
    name: moto-gastos-backend
    runtime: node
    rootDir: backend
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: WEBHOOK_API_KEY
        generateValue: true
      - key: CRON_SECRET
        generateValue: true
      - key: RUN_INTERNAL_CRON
        value: "false"
      - key: NOTIFICACAO_CRON
        value: "0 9 * * 1"
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: FRONTEND_URL
        sync: false
